<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
  <!-- Background circle - navy blue (government color) -->
  <circle cx="32" cy="32" r="32" fill="#1a3a6e"/>

  <!-- Ashoka Chakra (24-spoke wheel) - white -->
  <g transform="translate(32,32)">
    <!-- Outer ring -->
    <circle r="18" fill="none" stroke="#ffffff" stroke-width="2"/>
    <!-- Inner ring -->
    <circle r="4" fill="#ffffff"/>
    <!-- 24 spokes -->
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(0)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(15)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(30)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(45)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(60)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(75)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(90)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(105)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(120)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(135)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(150)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(165)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(180)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(195)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(210)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(225)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(240)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(255)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(270)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(285)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(300)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(315)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(330)"/>
    <line x1="0" y1="-4" x2="0" y2="-18" stroke="#ffffff" stroke-width="1" transform="rotate(345)"/>
  </g>

  <!-- Bottom text band -->
  <rect x="0" y="50" width="64" height="14" rx="0" fill="#f0a500"/>
  <text x="32" y="61" text-anchor="middle" font-family="serif" font-size="7" font-weight="bold" fill="#1a3a6e" letter-spacing="1">GOV</text>
</svg>
